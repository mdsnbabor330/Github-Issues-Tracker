<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- tailwind+daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <section class="h-screen flex items-center">
      <fieldset class="fieldset bg-white rounded-md w-md shadow-md p-6 mx-auto">
        <div class="text-center mb-6">
          <img src="./assets/github-logo.png" alt="" class="mx-auto mb-4" />
          <h3 class="text-[24px] font-semibold">Github Issues Tracker</h3>
          <p class="text-[16px] text-gray-500">Sign in to manage your issues</p>
        </div>
        <label class="label text-[16px] text-black font-medium">Username</label>
        <input
          id="username-input"  
          type="text"
          class="input w-full rounded-lg"
          placeholder="Enter Username"
        />
        <p class="text-blue-700 mb-3">Default: admin</p>

        <label class="label text-[16px] text-black font-medium">Password</label>
        <input
          id="password-input"  
          type="password"
          class="input w-full rounded-lg"
          placeholder="Password"
        />
        <p class="text-blue-700">Default: admin123</p>

        <button id="sign-in-btn" class="btn btn-primary rounded-lg my-4">
            Sign In</button>
        <div class="flex items-center justify-between mb-4">
          <hr class="w-5/12 border-gray-300" />
          OR
          <hr class="w-5/12 border-gray-300" />
        </div>
        <div class="text-center text-[16px]">
          <p class="text-gray-500">Demo Credentials:</p>
          <div class="w-full p-5 bg-gray-50 rounded-lg mt-4">
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> admin123</p>
          </div>
        </div>
      </fieldset>
    </section>
    <script src="app.js"></script>
  </body>
</html>
